name: Train forecast + calibrate thresholds

# Heavy, occasional job (pulls decades of history). Runs weekly + on demand.
# Commits the trained models so the frequent check workflow can just load them.
on:
  schedule:
    - cron: "0 9 * * 1"     # Mondays 09:00 UTC
  workflow_dispatch:
    inputs:
      calibrate:
        description: "Also recalibrate thresholds from history (writes config)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    concurrency:
      group: main-writer      # shared with check.yml/bootstrap.yml so pushes never race
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Calibrate flat thresholds (optional)
        if: ${{ inputs.calibrate }}
        run: python tools/calibrate_thresholds.py --write

      - name: Refresh per-month thresholds (all rivers)
        run: python tools/calibrate_thresholds.py --monthly

      - name: Diagnose gauge quality
        run: python tools/diagnose.py || true

      - name: Train models
        run: python tools/train_forecast.py

      - name: Commit models + thresholds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f models/*.json
          git add config/rivers.yaml config/thresholds_monthly.json config/diagnostics.json
          if git diff --cached --quiet; then
            echo "Nothing to commit."; exit 0
          fi
          git commit -m "Retrain models + refresh monthly thresholds [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git pull --rebase -X ours origin main || true
            sleep $((i * 3))
          done
          exit 1
