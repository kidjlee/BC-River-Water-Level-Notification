name: Bootstrap Region 2 rivers

# One-time (manual) job: add DFO Region 2 rivers that have a live gauge,
# calibrate their thresholds from history, train their models, rebuild the
# dashboard, and commit. Run from the Actions tab (workflow_dispatch).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    concurrency:
      group: main-writer      # shared with check.yml so pushes never race
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Add Region 2 rivers with a live gauge
        run: python tools/add_region2.py

      - name: Calibrate flat thresholds for new (unverified) rivers
        run: python tools/calibrate_thresholds.py --write --unverified-only

      - name: Calibrate per-month thresholds for all rivers
        run: python tools/calibrate_thresholds.py --monthly

      - name: Diagnose gauge quality (flag tidal/flat gauges)
        run: python tools/diagnose.py || true

      - name: Train any missing models
        run: python tools/train_forecast.py --missing-only || true

      - name: Build dashboard
        run: python -m src.main --no-notify

      - name: Commit everything
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/rivers.yaml config/thresholds_monthly.json config/diagnostics.json docs/index.html state/state.json
          git add -f models/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."; exit 0
          fi
          git commit -m "Bootstrap Region 2 rivers (add + calibrate + train) [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected (attempt $i) — rebasing and retrying"
            git pull --rebase -X ours origin main || true
            sleep $((i * 3))
          done
          echo "push failed after retries"; exit 1
