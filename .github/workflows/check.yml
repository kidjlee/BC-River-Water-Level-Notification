name: Check river levels

# Runs on GitHub's network (which CAN reach Environment Canada), builds the
# dashboard, trains models on first run, and commits results back so GitHub
# Pages can serve them to your phone.
#
# NOTE: `schedule` only fires from the repo's DEFAULT branch. On a feature
# branch, the `push` trigger below keeps the dashboard fresh; once merged to
# main, the 3-hourly schedule takes over.
on:
  push:
    branches: ["claude/salmon-water-level-alerts-ru8e9b"]
    paths-ignore: ["docs/**", "state/**", "models/**"]   # avoid self-trigger loops
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: river-check
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify station IDs (non-fatal — shows which are valid)
        run: python tools/discover_stations.py --verify 08MH001 08MF005 08HA011 08GA022 08EF001 || true

      - name: Train models on first run (real history)
        run: |
          if [ -z "$(ls models/*.json 2>/dev/null)" ]; then
            echo "No models yet — training from history..."
            python tools/train_forecast.py || true
          else
            echo "Models present — skipping training."
          fi

      - name: Run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main

      - name: Commit dashboard, state, models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html state/state.json
          git add -f models/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update river dashboard + models [skip ci]"
            git push
          fi
