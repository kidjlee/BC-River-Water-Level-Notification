name: Check river levels

# Runs on GitHub's network (which CAN reach Environment Canada), builds the
# dashboard, trains models on first run, and commits results back so GitHub
# Pages can serve them to your phone.
#
# NOTE: `schedule` only fires from the repo's DEFAULT branch. On a feature
# branch, the `push` trigger below keeps the dashboard fresh; once merged to
# main, the 3-hourly schedule takes over.
on:
  push:
    branches: ["main", "claude/salmon-water-level-alerts-ru8e9b"]
    paths-ignore: ["docs/**", "state/**", "models/**"]   # avoid self-trigger loops
  schedule:
    - cron: "10 * * * *"     # hourly (ECCC real-time updates ~hourly). Only fires from the default branch.
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send a test push for the notify rivers regardless of state"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: main-writer      # shared with bootstrap.yml so pushes never race
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify station IDs (non-fatal — shows which are valid)
        run: python tools/discover_stations.py --verify-config || true

      - name: Train any missing models (real history)
        run: python tools/train_forecast.py --missing-only || true

      - name: Run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main ${{ inputs.force_notify == true && '--force-notify' || '' }}

      - name: Commit dashboard, state, models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html state/state.json
          git add -f models/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."; exit 0
          fi
          git commit -m "Update river dashboard + models [skip ci]"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected (attempt $i) — rebasing on latest and retrying"
            git pull --rebase -X ours origin "${GITHUB_REF_NAME}" || true
            sleep $((i * 3))
          done
          echo "push failed after retries"; exit 1
