# ---------------------------------------------------------------------------
# BC salmon rivers to watch.
#
# Each river maps to an Environment Canada (ECCC) hydrometric station.
#
# THRESHOLDS ARE DATA-DRIVEN. Real fishable levels aren't published as gauge
# metres, so the honest way to set them is from each station's OWN history:
#   run  `python tools/calibrate_thresholds.py`  (needs internet)
# It pulls ~decades of daily records for the river's salmon season and sets
#   good_low  = ~25th percentile   (lower/clearer, very fishable)
#   good_high = ~60th percentile   (upper edge of nicely fishable)
#   blown_out = ~85th percentile   (too high/dirty/unsafe)
# The numbers below are research-seeded starting points until you calibrate.
#
# `metric` picks what those thresholds measure:
#   level -> water level in metres      (small/medium rivers)
#   flow  -> discharge in m^3/s (cms)   (big rivers; the metric anglers/
#                                        hydrologists actually use there)
#
# `fed_by` (rain|snow|glacier|mixed) controls the "best time of day" feature:
#   snow/glacier rivers have a daily melt cycle (afternoon rise, dirtier);
#   rain rivers don't, so time-of-day is suppressed for them.
#
# `season_months` = the salmon months; used by calibration and to avoid
#   off-season noise.
# ---------------------------------------------------------------------------

defaults:
  rising_rate_caution_frac_per_h: 0.03   # rising >3%/h of the good-zone width => "blowing out"

rivers:
  - name: "Vedder / Chilliwack River"
    station: "08MH001"          # Chilliwack R at Vedder Crossing (verified)
    verified: true
    lat: 49.09738
    lon: -121.96748
    metric: level
    region: "Lower Mainland"
    fed_by: mixed
    season_months: [9, 10, 11, 12]
    species: ["coho", "chum", "chinook", "steelhead"]
    good_low: 1.20
    good_high: 2.10
    blown_out: 2.60
    notes: "Prime on the drop after a rain bump, once it clears. A >1 m rise blows it out."

  - name: "Fraser River at Hope"
    station: "08MF005"          # Fraser R at Hope (verified)
    verified: true
    lat: 49.38596
    lon: -121.45424
    metric: flow               # discussed in m^3/s, not level
    region: "Fraser Valley"
    fed_by: snow
    season_months: [7, 8, 9, 10]
    species: ["sockeye", "pink", "chinook"]
    good_low: 2000
    good_high: 5000
    blown_out: 7000
    notes: "Bar fishing; lower/clearer is better. Freshet peaks 7000-11000 cms."

  - name: "Cowichan River"
    station: "08HA011"          # Cowichan R near Duncan (verified)
    verified: true
    lat: 48.77308
    lon: -123.71447
    metric: level
    region: "Vancouver Island"
    fed_by: rain
    season_months: [10, 11, 12]
    species: ["coho", "chinook", "steelhead", "brown trout"]
    good_low: 0.70
    good_high: 1.40
    blown_out: 2.00
    notes: "Low-water summer fishery; needs fall rain to fire up."

  - name: "Squamish River"
    station: "08GA022"          # Squamish R near Brackendale (verified)
    verified: true
    lat: 49.79502
    lon: -123.20316
    metric: level
    region: "Sea-to-Sky"
    fed_by: glacier
    season_months: [8, 9, 10, 11]
    species: ["chum", "coho", "pink", "steelhead"]
    good_low: 1.00
    good_high: 2.00
    blown_out: 2.80
    notes: "Glacial; afternoon melt raises + dirties it. Best fished early."

  - name: "Skeena River at Usk"
    station: "08EF001"          # Skeena R at Usk (verified)
    verified: true
    lat: 54.63726
    lon: -128.40826
    metric: flow
    region: "North Coast"
    fed_by: snow
    season_months: [7, 8, 9, 10]
    species: ["chinook", "sockeye", "coho", "steelhead"]
    good_low: 800
    good_high: 2500
    blown_out: 4000
    notes: "Freshet-driven; huge seasonal swing. Calibrate flow thresholds."

  - name: "Capilano River"
    station: "08GA010"          # Capilano R above intake (verify active/real-time)
    verified: false
    lat: 49.40
    lon: -123.11
    metric: level
    region: "North Shore"
    fed_by: rain
    season_months: [9, 10, 11, 12]
    species: ["coho", "chum", "steelhead"]
    good_low: 0.30
    good_high: 0.90
    blown_out: 1.40
    notes: "Below Cleveland Dam; flashy after rain. Calibrate thresholds."

  - name: "Coquitlam River"
    station: "08MH002"          # Coquitlam R at Port Coquitlam (verify active/real-time)
    verified: false
    lat: 49.25
    lon: -122.78
    metric: level
    region: "Lower Mainland"
    fed_by: rain
    season_months: [10, 11, 12]
    species: ["chum", "coho", "chinook"]
    good_low: 0.40
    good_high: 1.10
    blown_out: 1.70
    notes: "Dam-controlled + rain response. Calibrate thresholds."
