# ---------------------------------------------------------------------------
# BC salmon rivers to watch.
#
# Each river maps to an Environment Canada (ECCC) hydrometric station.
#
# THRESHOLDS ARE DATA-DRIVEN. Real fishable levels aren't published as gauge
# metres, so the honest way to set them is from each station's OWN history:
#   run  `python tools/calibrate_thresholds.py`  (needs internet)
# It pulls ~decades of daily records for the river's salmon season and sets
#   good_low  = ~25th percentile   (lower/clearer, very fishable)
#   good_high = ~60th percentile   (upper edge of nicely fishable)
#   blown_out = ~85th percentile   (too high/dirty/unsafe)
# The numbers below are research-seeded starting points until you calibrate.
#
# `metric` picks what those thresholds measure:
#   level -> water level in metres      (small/medium rivers)
#   flow  -> discharge in m^3/s (cms)   (big rivers; the metric anglers/
#                                        hydrologists actually use there)
#
# `fed_by` (rain|snow|glacier|mixed) controls the "best time of day" feature:
#   snow/glacier rivers have a daily melt cycle (afternoon rise, dirtier);
#   rain rivers don't, so time-of-day is suppressed for them.
#
# `season_months` = the salmon months; used by calibration and to avoid
#   off-season noise.
# ---------------------------------------------------------------------------

defaults:
  rising_rate_caution_frac_per_h: 0.03   # rising >3%/h of the good-zone width => "blowing out"

rivers:
  - name: "Vedder / Chilliwack River"
    station: "08MH001"          # Chilliwack R at Vedder Crossing (verified)
    notify: true
    verified: true
    lat: 49.09738
    lon: -121.96748
    metric: level
    region: "Lower Mainland"
    fed_by: mixed
    season_months: [9, 10, 11, 12]
    species: ["coho", "chum", "chinook", "steelhead"]
    good_low: 1.20
    good_high: 2.10
    blown_out: 2.60
    notes: "Prime on the drop after a rain bump, once it clears. A >1 m rise blows it out."

  - name: "Fraser River at Hope"
    station: "08MF005"          # Fraser R at Hope (verified)
    verified: true
