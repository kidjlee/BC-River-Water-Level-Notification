    region: "Fraser Valley"
    fed_by: snow
    season_months: [7, 8, 9, 10]
    species: ["sockeye", "pink", "chinook"]
    good_low: 2000
    good_high: 5000
    blown_out: 7000
    notes: "Bar fishing; lower/clearer is better. Freshet peaks 7000-11000 cms."

